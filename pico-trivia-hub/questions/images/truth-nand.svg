<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" font-family="ui-monospace, Menlo, monospace">
  <rect width="360" height="320" fill="#0d121b"/>
  <text x="180" y="44" text-anchor="middle" fill="#7e8aa0" font-size="20" font-family="sans-serif">Truth Table</text>
  <g fill="#e6ecf3" font-size="28">
    <text x="80"  y="100">A</text><text x="160" y="100">B</text><text x="260" y="100">OUT</text>
  </g>
  <line x1="40" y1="120" x2="320" y2="120" stroke="#3a3f48" stroke-width="2"/>
  <g fill="#e6ecf3" font-size="28">
    <text x="80"  y="160">0</text><text x="160" y="160">0</text><text x="270" y="160">1</text>
    <text x="80"  y="200">0</text><text x="160" y="200">1</text><text x="270" y="200">1</text>
    <text x="80"  y="240">1</text><text x="160" y="240">0</text><text x="270" y="240">1</text>
    <text x="80"  y="280">1</text><text x="160" y="280">1</text><text x="270" y="280">0</text>
  </g>
</svg>
