<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="sans-serif">
  <rect width="480" height="320" fill="#0d121b"/>
  <text x="240" y="32" text-anchor="middle" fill="#e6ecf3" font-size="22" font-weight="bold">B</text>
  <!-- power source -->
  <line x1="50" y1="180" x2="50" y2="220" stroke="#e6ecf3" stroke-width="3"/>
  <line x1="40" y1="190" x2="60" y2="190" stroke="#e6ecf3" stroke-width="4"/>
  <line x1="44" y1="210" x2="56" y2="210" stroke="#e6ecf3" stroke-width="3"/>
  <text x="20" y="195" fill="#e6ecf3" font-size="14">+</text>
  <text x="20" y="220" fill="#e6ecf3" font-size="14">−</text>
  <line x1="50" y1="180" x2="120" y2="180" stroke="#e6ecf3" stroke-width="3"/>
  <line x1="50" y1="220" x2="430" y2="220" stroke="#e6ecf3" stroke-width="3"/>
  <!-- left 3-way switch: common on left, two travelers on right -->
  <circle cx="120" cy="180" r="6" fill="none" stroke="#e6ecf3" stroke-width="3"/>
  <text x="105" y="200" fill="#7e8aa0" font-size="11">com</text>
  <line x1="120" y1="180" x2="170" y2="150" stroke="#e6ecf3" stroke-width="3"/>
  <circle cx="170" cy="150" r="6" fill="none" stroke="#e6ecf3" stroke-width="3"/>
  <circle cx="170" cy="210" r="6" fill="none" stroke="#e6ecf3" stroke-width="3"/>
  <text x="180" y="155" fill="#7e8aa0" font-size="11">T1</text>
  <text x="180" y="215" fill="#7e8aa0" font-size="11">T2</text>
  <!-- traveler wires (cross between switches) -->
  <line x1="170" y1="150" x2="310" y2="210" stroke="#cc2030" stroke-width="3"/>
  <line x1="170" y1="210" x2="310" y2="150" stroke="#cc2030" stroke-width="3"/>
  <!-- right 3-way switch: two travelers on left, common on right -->
  <circle cx="310" cy="150" r="6" fill="none" stroke="#e6ecf3" stroke-width="3"/>
  <circle cx="310" cy="210" r="6" fill="none" stroke="#e6ecf3" stroke-width="3"/>
  <text x="285" y="155" fill="#7e8aa0" font-size="11">T1</text>
  <text x="285" y="215" fill="#7e8aa0" font-size="11">T2</text>
  <line x1="310" y1="150" x2="360" y2="180" stroke="#e6ecf3" stroke-width="3"/>
  <circle cx="360" cy="180" r="6" fill="none" stroke="#e6ecf3" stroke-width="3"/>
  <text x="365" y="200" fill="#7e8aa0" font-size="11">com</text>
  <!-- load (light) -->
  <line x1="360" y1="180" x2="430" y2="180" stroke="#e6ecf3" stroke-width="3"/>
  <circle cx="430" cy="200" r="20" fill="none" stroke="#e6ecf3" stroke-width="3"/>
  <line x1="416" y1="186" x2="444" y2="214" stroke="#e6ecf3" stroke-width="2"/>
  <line x1="444" y1="186" x2="416" y2="214" stroke="#e6ecf3" stroke-width="2"/>
</svg>
