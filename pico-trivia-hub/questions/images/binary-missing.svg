<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 460" font-family="ui-monospace, Menlo, monospace">
  <rect width="380" height="460" fill="#0d121b"/>
  <text x="190" y="40" text-anchor="middle" fill="#7e8aa0" font-size="20" font-family="sans-serif">4-bit Binary</text>
  <g fill="#e6ecf3" font-size="26">
    <text x="80"  y="90">Decimal</text>
    <text x="240" y="90">Binary</text>
  </g>
  <line x1="40" y1="105" x2="340" y2="105" stroke="#3a3f48" stroke-width="2"/>
  <g fill="#e6ecf3" font-size="26">
    <text x="120" y="145">0</text><text x="240" y="145">0000</text>
    <text x="120" y="180">1</text><text x="240" y="180">0001</text>
    <text x="120" y="215">2</text><text x="240" y="215">0010</text>
    <text x="120" y="250">3</text><text x="240" y="250">0011</text>
    <text x="120" y="285">4</text>
    <text x="240" y="285" fill="#cc2030" font-weight="bold">?</text>
    <text x="120" y="320">5</text><text x="240" y="320">0101</text>
    <text x="120" y="355">6</text><text x="240" y="355">0110</text>
  </g>
</svg>
