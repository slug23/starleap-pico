<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="sans-serif">
  <rect width="400" height="240" fill="#0d121b"/>
  <rect x="80" y="80" width="240" height="80" rx="4" fill="#1a1f2a" stroke="#3a3f48" stroke-width="2"/>
  <rect x="100" y="95" width="200" height="50" fill="#262d3a" stroke="#3a3f48" stroke-width="1"/>
  <!-- slider knob -->
  <rect x="140" y="50" width="40" height="50" rx="3" fill="#1a1f2a" stroke="#0a0d14" stroke-width="2"/>
  <!-- 3 pins -->
  <line x1="130" y1="160" x2="130" y2="220" stroke="#bdbdbd" stroke-width="4"/>
  <line x1="200" y1="160" x2="200" y2="220" stroke="#bdbdbd" stroke-width="4"/>
  <line x1="270" y1="160" x2="270" y2="220" stroke="#bdbdbd" stroke-width="4"/>
</svg>
