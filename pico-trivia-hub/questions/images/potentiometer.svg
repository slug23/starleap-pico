<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" font-family="sans-serif">
  <rect width="400" height="320" fill="#0d121b"/>
  <!-- shaft -->
  <rect x="190" y="50" width="20" height="60" fill="#9aa0aa" stroke="#5a6070" stroke-width="2"/>
  <line x1="190" y1="80" x2="210" y2="80" stroke="#1a1f2a" stroke-width="3"/>
  <!-- body -->
  <rect x="120" y="110" width="160" height="120" rx="8" fill="#3d6dbf" stroke="#1d3a6b" stroke-width="2"/>
  <text x="200" y="180" text-anchor="middle" fill="#e6ecf3" font-size="22" font-weight="bold">10kΩ</text>
  <!-- 3 leads -->
  <line x1="150" y1="230" x2="150" y2="305" stroke="#bdbdbd" stroke-width="3"/>
  <line x1="200" y1="230" x2="200" y2="305" stroke="#bdbdbd" stroke-width="3"/>
  <line x1="250" y1="230" x2="250" y2="305" stroke="#bdbdbd" stroke-width="3"/>
</svg>
